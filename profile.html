<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - Playhaus</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .profile-header {
      text-align: center;
      padding: 60px 20px 40px;
      margin-top: 60px;
    }
    .profile-avatar {
      font-size: 5rem;
      margin-bottom: 20px;
      display: inline-block;
      background: #1e293b;
      padding: 20px;
      border-radius: 50%;
      border: 4px solid #38BDF8;
    }
    .profile-name {
      font-size: 2.5rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 5px;
    }
    .profile-join-date {
      color: #94a3b8;
      font-size: 1rem;
      margin-bottom: 30px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 800px;
      margin: 0 auto 40px;
    }
    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 30px 20px;
      text-align: center;
    }
    .stat-value {
      font-size: 2.5rem;
      font-weight: 900;
      color: #38BDF8;
      margin-bottom: 10px;
    }
    .stat-label {
      color: #cbd5e1;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.9rem;
    }
    .badges-section {
      max-width: 800px;
      margin: 0 auto 60px;
      text-align: center;
    }
    .badges-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .profile-badge {
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid #38BDF8;
      color: #38BDF8;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #0f172a;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #38BDF8;
      font-size: 1.5rem;
      font-weight: 800;
    }
  </style>
</head>
<body>

<header class="nav" id="top-nav">
  <div class="nav__inner">
    <a href="index.html" class="nav__logo">
      <span class="nav__logo-icon">🏠</span>
      <span>Play<strong>haus</strong></span>
    </a>
    <nav class="nav__links" id="desktop-nav">
      <a href="index.html" class="nav__link">Home</a>
    </nav>
    <div id="auth-container" style="display: flex; gap: 10px; align-items: center;">
      <button class="btn btn--outline" id="btn-login-trigger" style="padding: 8px 16px;">Log In</button>
    </div>
  </div>
</header>

<div id="profile-loading" class="loading-overlay">Loading Profile...</div>

<section class="profile-header" id="profile-content" style="display: none;">
  <div class="profile-avatar">👾</div>
  <h1 class="profile-name" id="profile-username">Loading...</h1>
  <p class="profile-join-date" id="profile-joined">Joined: ...</p>
  
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-points">0</div>
      <div class="stat-label">Total Points</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-games">0</div>
      <div class="stat-label">Games Played</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-rank">#?</div>
      <div class="stat-label">Global Rank</div>
    </div>
  </div>
  
  <div class="badges-section">
    <h2 style="color: #fff; margin-bottom: 10px;">Achievements</h2>
    <div class="badges-container" id="badges-container">
      <!-- Loaded via JS -->
    </div>
  </div>
</section>

<!-- ===== AUTH MODAL ===== -->
<div id="auth-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
  <div style="background: #1e293b; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #334155; position: relative;">
    <button id="auth-close" style="position: absolute; top: 10px; right: 15px; background: transparent; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer;">✕</button>
    <h2 id="auth-title" style="margin-bottom: 20px; font-weight: 900; color: #fff;">Log In</h2>
    <div id="auth-error" style="color: #EF4444; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; display: none;"></div>
    <input type="text" id="auth-username" placeholder="Username (for new signups)" style="display: none; width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;" />
    <input type="email" id="auth-email" placeholder="Email Address" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;" />
    <input type="password" id="auth-password" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;" />
    <button id="auth-submit" class="btn btn--primary" style="width: 100%; margin-bottom: 15px;">Log In</button>
    <p style="color: #94a3b8; font-size: 0.9rem;">
      <span id="auth-toggle-text">Don't have an account?</span> 
      <a href="#" id="auth-toggle-link" style="color: #38BDF8; font-weight: 700; text-decoration: none;">Sign Up</a>
    </p>
  </div>
</div>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/profile.js"></script>
</body>
</html>
